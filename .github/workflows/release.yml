name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Validate release readiness with dogfooding
  validate-release:
    name: Validate Release (Dogfooding)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Run dogfooding validation
        run: |
          echo "Running Ferrous Forge on itself (dogfooding test)..."
          ./target/release/ferrous-forge validate . || echo "::warning::Dogfooding validation found issues (non-blocking for release)"

      - name: Run full test suite
        run: cargo test --all-features

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          GIT_TAG=${GITHUB_REF#refs/tags/v}
          if [ "$CARGO_VERSION" != "$GIT_TAG" ]; then
            echo "Version mismatch: Cargo.toml has $CARGO_VERSION but git tag is $GIT_TAG"
            exit 1
          fi
          echo "Version matches: $CARGO_VERSION"

  # Publish to crates.io (trusted publishing via OIDC)
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: validate-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        run: cargo publish

  # Build Release Binaries
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: validate-release
    strategy:
      matrix:
        include:
          # Linux targets
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: ferrous-forge-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: ferrous-forge-linux-x86_64-musl
          # Disabled due to OpenSSL cross-compilation issues:
          # - os: ubuntu-latest
          #   target: aarch64-unknown-linux-gnu
          #   name: ferrous-forge-linux-aarch64

          # macOS targets
          - os: macos-latest
            target: x86_64-apple-darwin
            name: ferrous-forge-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: ferrous-forge-macos-aarch64

          # Windows targets
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: ferrous-forge-windows-x86_64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build (native)
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.os != 'ubuntu-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/ferrous-forge

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.name }}.tar.gz ferrous-forge
          cd ../../..

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip ferrous-forge.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip
          if-no-files-found: ignore

  # Create GitHub Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate-release, publish-crates, build]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Ferrous Forge v${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          body: |
            ## Installation

            ### Cargo
            ```bash
            cargo install ferrous-forge --version ${{ steps.get_version.outputs.version }}
            ```

            ### Binary Downloads
            Download the appropriate binary for your platform from the assets below.

            ## Upgrading

            ```bash
            ferrous-forge update
            ```

            ## Documentation

            - [API Documentation](https://docs.rs/ferrous-forge/${{ steps.get_version.outputs.version }})

